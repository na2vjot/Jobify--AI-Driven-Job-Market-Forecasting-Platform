<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Trends 2023</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Modern CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Gradient Background */
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, 
                rgba(16, 24, 39, 0.95) 0%, 
                rgba(31, 41, 55, 0.95) 100%),
                url('bgimage.jpg') center/cover fixed;
            color: #fff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Modern Glassmorphism Header */
        header {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.08);
            padding: 1rem 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        .logo img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .logo span {
            color: #4CAF50;
            position: relative;
            animation: arrowPulse 1.5s infinite;
        }

        @keyframes arrowPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Navigation Enhancements */
        nav ul {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            position: relative;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
        }

        nav a::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: #4CAF50;
            transition: width 0.3s ease;
        }

        nav a:hover::before {
            width: 100%;
        }

        /* Main Content Section */
        .technology-section {
            padding: 120px 5% 50px;
            text-align: center;
        }

        h2 {
            font-size: 2.8rem;
            margin-bottom: 2rem;
            background: linear-gradient(45deg, #4CAF50, #2196F3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* Enhanced Main Button */
        .main-button {
            padding: 1.2rem 2.5rem;
            font-size: 1.2rem;
            background: linear-gradient(45deg, #4CAF50, #2196F3);
            border: none;
            border-radius: 1rem;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            margin: 2rem 0;
        }

        .main-button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(45deg) translate(-20%, 100%);
            transition: all 0.5s ease;
        }

        .main-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.3);
        }

        .main-button:hover::after {
            transform: rotate(45deg) translate(20%, -100%);
        }

        /* Interactive Grid Buttons */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .button-grid button {
            padding: 1.5rem;
            background: rgba(76, 175, 80, 0.1); /* Green transparent background */
            border: 1px solid rgba(76, 175, 80, 0.3); /* Light green border */
            border-radius: 1rem;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;transition: all 1.0s ease; /* Faster transition (0.1s) */
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
            transform: perspective(500px) rotateX(0) rotateY(0); /* 3D perspective */
            box-shadow: 
                inset 0 0 15px rgba(76, 175, 80, 0.6), /* Inner glow */
                0 0 20px rgba(76, 175, 80, 0.4); /* Outer glow */
        }

        /* Enhanced glow and tilt effect on hover */
        .button-grid button:hover {
            background: rgba(76, 175, 80, 0.3); /* Slightly more green on hover */
            box-shadow: 
                inset 0 0 25px rgba(76, 175, 80, 0.8), /* Stronger inner glow */
                0 0 30px rgba(76, 175, 80, 0.6); /* Stronger outer glow */
            transform: perspective(500px) 
                rotateX(10deg) 
                rotateY(10deg); /* Dynamic tilt */
        }

        /* Green background and brightest glow on click */
        .button-grid button:active {
            background: rgba(76, 175, 80, 0.5); /* Darker green on click */
            box-shadow: 
                inset 0 0 35px rgba(76, 175, 80, 1), /* Brightest inner glow */
                0 0 40px rgba(76, 175, 80, 0.8); /* Brightest outer glow */
        }

        /* Scroll Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .technology-section > * {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
        }

        .technology-section h2 { animation-delay: 0.2s; }
        .main-button { animation-delay: 0.4s; }
        .button-grid { animation-delay: 0.6s; }

        /* Responsive Design */
        @media (max-width: 768px) {
            h2 {
                font-size: 2rem;
            }
            
            .button-grid {
                grid-template-columns: 1fr;
            }
            
            nav ul {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="#" class="logo">
            <img src="logo1.jpg" alt="Tech Trends Logo">
            Technology<span>>></span>
        </a>
        <nav>
            <ul>
                <li><a href="index.php">Home</a></li>
                <li><a href="#trends">Trends</a></li>
                <li><a href="#about">About</a></li>
            </ul>
        </nav>
    </header>

    <section class="technology-section">
        <h2>Future Tech Careers Await!</h2>
        <button class="main-button">Explore Job Trend Predictions</button>
        
        <div class="button-grid">
            <button>🦷 Dentist</button>
            <button>🩺 Physician</button>
            <button>🐾 Veterinarian</button>
            <button>🧴 Dermatologist </button>
            <button>💊 Pharmacist</button>
            <button>👶 Pediatrician </button>
            <button>🤰 Gynecologist </button>
            <button>💉 Anesthesiologist</button>
            <button>👩‍⚕️ Nurse Practitioner</button>
            <button>🫀 Cardiologist</button>
    </section>

    <script>
        // Add dynamic tilt effect based on cursor position
        document.querySelectorAll('.button-grid button').forEach(button => {
            button.addEventListener('mousemove', (e) => {
                const rect = button.getBoundingClientRect();
                const x = e.clientX - rect.left; // X position within the button
                const y = e.clientY - rect.top; // Y position within the button

                const centerX = rect.width / 2;
                const centerY = rect.height / 2;

                // Calculate tilt based on cursor position (reduced tilt amount)
                const rotateX = ((y - centerY) / centerY) * 3; // Reduced tilt (3 degrees max)
                const rotateY = ((x - centerX) / centerX) * -3; // Reduced tilt (3 degrees max)

                button.style.setProperty('--rotate-x', `${rotateX}deg`);
                button.style.setProperty('--rotate-y', `${rotateY}deg`);
            });

            // Reset tilt when cursor leaves the button
            button.addEventListener('mouseleave', () => {
                button.style.setProperty('--rotate-x', '0deg');
                button.style.setProperty('--rotate-y', '0deg');
            });

            // Green background on click
            button.addEventListener('click', () => {
                button.style.backgroundColor = 'rgba(76, 175, 80, 0.5)'; // Darker green on click
                setTimeout(() => {
                    button.style.backgroundColor = 'rgba(76, 175, 80, 0.2)'; // Reset after delay
                }, 200); // Adjust delay as needed
            });
        });

        // Smooth scroll for navigation
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });

        // Header scroll effect
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            header.style.background = window.scrollY > 50 
                ? 'rgba(16, 24, 39, 0.95)' 
                : 'rgba(255, 255, 255, 0.08)';
        });
    </script>
</body>
</html>
